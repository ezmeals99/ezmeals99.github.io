<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EZ Meals</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
text-align:center;
}

header{
padding:30px;
}

header img{
width:220px;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
padding:20px;
}

.card{
width:220px;
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
overflow:hidden;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card h3{
padding:10px;
}

.items{
display:none;
padding:20px;
}

.item{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.qty{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:10px;
}

button{
padding:5px 10px;
font-size:16px;
cursor:pointer;
}

.order{
margin:30px;
padding:15px 30px;
font-size:18px;
background:#25D366;
color:white;
border:none;
border-radius:8px;
}

</style>

</head>

<body>

<header>
<img src="logo.png">
</header>

<div class="container">

<div class="card" onclick="showPack('fruits')">
<img src="https://images.unsplash.com/photo-1619566636858-adf3ef46400b">
<h3>Fruit Packs</h3>
</div>

<div class="card" onclick="showPack('soup')">
<img src="https://images.unsplash.com/photo-1547592166-23ac45744acd">
<h3>Soup Packs</h3>
</div>

<div class="card" onclick="showPack('curry')">
<img src="https://images.unsplash.com/photo-1604908176997-4310b9c84e13">
<h3>Curry Packs</h3>
</div>

</div>

<div id="items" class="items"></div>

<button class="order" onclick="order()">Order via WhatsApp</button>

<script>

let data = {

fruits:[
{name:"Mango 200g"},
{name:"Apple 100g"},
{name:"Banana 100g"}
],

soup:[
{name:"Potato"},
{name:"Beans"}
],

curry:[
{name:"Chicken"},
{name:"Fish"}
]

}

let cart={}

function showPack(type){

let html=""

data[type].forEach(item=>{

cart[item.name]=0

html+=`

<div class="item">

<h3>${item.name}</h3>

<div class="qty">

<button onclick="change('${item.name}',-1)">-</button>

<span id="${item.name}">0</span>

<button onclick="change('${item.name}',1)">+</button>

</div>

</div>

`

})

document.getElementById("items").innerHTML=html
document.getElementById("items").style.display="block"

}

function change(name,val){

cart[name]+=val

if(cart[name]<0) cart[name]=0

document.getElementById(name).innerText=cart[name]

}

function order(){

let msg="Hello EZ Meals,%0AOrder:%0A"

for(let item in cart){

if(cart[item]>0){

msg+=item+" x"+cart[item]+"%0A"

}

}

window.open("https://wa.me/94762522078?text="+msg)

}

</script>

</body>
</html>
