<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EZ Meals</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
text-align:center;
}

header{
padding:20px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
position:relative;
}

.settings{
position:absolute;
right:20px;
top:20px;
font-size:22px;
cursor:pointer;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
width:220px;
background:white;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card h3{
margin:10px;
}

.card p{
font-size:14px;
padding:0 10px;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
}

button{
padding:6px 12px;
border:none;
background:#28a745;
color:white;
border-radius:6px;
cursor:pointer;
}

.delBtn{
background:red;
}

.total{
position:fixed;
bottom:20px;
right:20px;
background:#28a745;
color:white;
padding:15px;
border-radius:30px;
font-weight:bold;
}

.adminBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.adminPanel{
background:white;
padding:20px;
border-radius:10px;
width:300px;
}

.adminPanel input, .adminPanel select{
width:100%;
margin:6px 0;
padding:7px;
}

</style>

</head>

<body>

<header>

<h2>EZ Meals</h2>

<div class="settings" onclick="openAdmin()">⚙️</div>

</header>

<div id="packs" class="container"></div>

<div id="items"></div>

<div class="total">

Total Rs <span id="total">0</span>

<br><br>

<button onclick="order()">Order on WhatsApp</button>

</div>

<div id="adminLogin" class="adminBox">

<div class="adminPanel">

<h3>Admin Login</h3>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="adminControls" style="display:none">

<h3>Add Item</h3>

<input id="iname" placeholder="Item Name">
<input id="idesc" placeholder="Description">
<input id="iprice" placeholder="Price per 100g">

<input type="file" id="iimg">

<select id="ipack">
<option value="fruits">Fruit Pack</option>
<option value="soup">Soup Pack</option>
<option value="curry">Curry Pack</option>
</select>

<button onclick="addItem()">Add Item</button>

</div>

</div>

</div>

<script>

let data=JSON.parse(localStorage.getItem("ezmeals"))||{
fruits:[],
soup:[],
curry:[]
}

let cart={}
let total=0
let isAdmin=false

function renderPacks(){

let html=""

html+=packCard("Fruit Packs","fruits","fruit")
html+=packCard("Soup Packs","soup","soup")
html+=packCard("Curry Packs","curry","curry")

document.getElementById("packs").innerHTML=html

}

function packCard(name,type,img){

return`
<div class="card" onclick="openPack('${type}')">

<img src="https://source.unsplash.com/400x300/?${img}">

<h3>${name}</h3>

</div>
`

}

renderPacks()

function openPack(type){

document.getElementById("packs").style.display="none"

let html='<button onclick="location.reload()">⬅ Back</button>'

html+='<div class="container">'

data[type].forEach(i=>{

if(!cart[i.name])cart[i.name]={g:0,price:i.price}

html+=`

<div class="card">

<img src="${i.img}">

<h3>${i.name}</h3>

<p>${i.desc}</p>

${isAdmin?`<button class="delBtn" onclick="deleteItem('${type}','${i.name}')">Delete</button>`:""}

<div class="qty">

<button onclick="change('${i.name}',-100)">-</button>

<span id="${i.name}">${cart[i.name].g} g</span>

<button onclick="change('${i.name}',100)">+</button>

</div>

</div>

`

})

html+="</div>"

document.getElementById("items").innerHTML=html

}

function change(name,val){

cart[name].g+=val

if(cart[name].g<0)cart[name].g=0

document.getElementById(name).innerText=cart[name].g+" g"

updateTotal()

}

function updateTotal(){

total=0

for(let i in cart){

let g=cart[i].g
let p=cart[i].price

if(g>0){

total+=(g/100)*p

}

}

document.getElementById("total").innerText=total

}

function order(){

let msg="Hello EZ Meals%0AOrder:%0A"

for(let i in cart){

if(cart[i].g>0){

msg+=i+" "+cart[i].g+"g%0A"

}

}

msg+="Total Rs "+total

window.open("https://wa.me/94762522078?text="+msg)

}

function openAdmin(){

document.getElementById("adminLogin").style.display="flex"

}

function login(){

if(user.value==="ezmealadmin"&&pass.value==="9999"){

isAdmin=true

document.getElementById("adminControls").style.display="block"

alert("Admin Logged In")

}

}

function addItem(){

let file=document.getElementById("iimg").files[0]

let reader=new FileReader()

reader.onload=function(){

let item={
name:iname.value,
desc:idesc.value,
price:Number(iprice.value),
img:reader.result
}

data[ipack.value].push(item)

localStorage.setItem("ezmeals",JSON.stringify(data))

alert("Item Added")

}

reader.readAsDataURL(file)

}

function deleteItem(type,name){

data[type]=data[type].filter(i=>i.name!==name)

localStorage.setItem("ezmeals",JSON.stringify(data))

location.reload()

}

if('serviceWorker'in navigator){

navigator.serviceWorker.register('service-worker.js')

}

</script>

</body>
</html>
