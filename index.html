<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EZ Meals</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
text-align:center;
}

header{
background:white;
padding:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
position:relative;
}

.settings{
position:absolute;
right:20px;
top:18px;
font-size:22px;
cursor:pointer;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
width:200px;
background:white;
border-radius:10px;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card h3{
margin:10px;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
}

button{
padding:6px 12px;
border:none;
border-radius:5px;
background:#28a745;
color:white;
cursor:pointer;
}

.total{
position:fixed;
bottom:20px;
right:20px;
background:#28a745;
color:white;
padding:15px;
border-radius:25px;
}

.adminBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.adminPanel{
background:white;
padding:20px;
border-radius:10px;
width:300px;
}

.adminPanel input,
.adminPanel select{
width:100%;
margin:6px 0;
padding:6px;
}

.del{
background:red;
}

</style>

</head>

<body>

<header>

<h2>EZ Meals</h2>

<div class="settings" onclick="openAdmin()">⚙️</div>

</header>

<div id="packs" class="container"></div>

<div id="items"></div>

<div class="total">

Total Rs <span id="total">0</span>

<br><br>

<button onclick="order()">Order WhatsApp</button>

</div>

<div id="adminLogin" class="adminBox">

<div class="adminPanel">

<h3>Admin Login</h3>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="adminControls" style="display:none">

<h3>Add Item</h3>

<input id="iname" placeholder="Name">
<input id="idesc" placeholder="Description">
<input id="iprice" placeholder="Price per 100g">

<input type="file" id="iimg">

<select id="ipack">
<option value="fruits">Fruit Pack</option>
<option value="soup">Soup Pack</option>
<option value="curry">Curry Pack</option>
</select>

<button onclick="addItem()">Add</button>

</div>

</div>

</div>

<script>

let data=JSON.parse(localStorage.getItem("ezdata"))||{
fruits:[],
soup:[],
curry:[]
}

let cart={}
let total=0
let admin=false

function renderPacks(){

document.getElementById("packs").innerHTML=`

<div class="card" onclick="openPack('fruits')">
<img src="https://source.unsplash.com/400x300/?fruit">
<h3>Fruit Packs</h3>
</div>

<div class="card" onclick="openPack('soup')">
<img src="https://source.unsplash.com/400x300/?soup">
<h3>Soup Packs</h3>
</div>

<div class="card" onclick="openPack('curry')">
<img src="https://source.unsplash.com/400x300/?curry">
<h3>Curry Packs</h3>
</div>

`

}

renderPacks()

function openPack(type){

document.getElementById("packs").style.display="none"

let html=`<button onclick="location.reload()">⬅ Back</button><div class="container">`

data[type].forEach(i=>{

if(!cart[i.name]) cart[i.name]={g:0,price:i.price}

html+=`

<div class="card">

<img src="${i.img}">

<h3>${i.name}</h3>

<p>${i.desc}</p>

${admin?`<button class="del" onclick="del('${type}','${i.name}')">Delete</button>`:""}

<div class="qty">

<button onclick="change('${i.name}',-100)">-</button>

<span id="${i.name}">${cart[i.name].g} g</span>

<button onclick="change('${i.name}',100)">+</button>

</div>

</div>

`

})

html+="</div>"

document.getElementById("items").innerHTML=html

}

function change(n,v){

cart[n].g+=v

if(cart[n].g<0) cart[n].g=0

document.getElementById(n).innerText=cart[n].g+" g"

calc()

}

function calc(){

total=0

for(let i in cart){

let g=cart[i].g
let p=cart[i].price

if(g>0) total+=(g/100)*p

}

document.getElementById("total").innerText=total

}

function order(){

let msg="Hello EZ Meals%0AOrder:%0A"

for(let i in cart){

if(cart[i].g>0){

msg+=i+" "+cart[i].g+"g%0A"

}

}

msg+="Total Rs "+total

window.open("https://wa.me/94762522078?text="+msg)

}

function openAdmin(){

document.getElementById("adminLogin").style.display="flex"

}

function login(){

if(user.value==="ezmealadmin" && pass.value==="9999"){

admin=true

document.getElementById("adminControls").style.display="block"

alert("Admin Logged")

}

}

function addItem(){

let f=document.getElementById("iimg").files[0]

let r=new FileReader()

r.onload=function(){

let item={
name:iname.value,
desc:idesc.value,
price:Number(iprice.value),
img:r.result
}

data[ipack.value].push(item)

localStorage.setItem("ezdata",JSON.stringify(data))

alert("Item Added")

}

r.readAsDataURL(f)

}

function del(type,name){

data[type]=data[type].filter(i=>i.name!==name)

localStorage.setItem("ezdata",JSON.stringify(data))

location.reload()

}

</script>

</body>
</html>
